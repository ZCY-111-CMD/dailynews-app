name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI and iOS platform
        run: |
          npm install @capacitor/ios
          npm install -D @capacitor/cli

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync iOS
        run: npx cap sync ios

      - name: Build iOS (without signing)
        run: |
          cd ios/App
          ls -la
          echo "---"
          PROJECT_FILE=$(ls *.xcworkspace *.xcodeproj 2>/dev/null | head -1)
          echo "Project file: $PROJECT_FILE"
          if [[ "$PROJECT_FILE" == *.xcworkspace ]]; then
            xcodebuild -workspace "$PROJECT_FILE" -scheme App -configuration Release -sdk iphoneos -archivePath build/App.xcarchive archive CODE_SIGNING_ALLOWED=NO 2>&1
          else
            xcodebuild -project "$PROJECT_FILE" -scheme App -configuration Release -sdk iphoneos -archivePath build/App.xcarchive archive CODE_SIGNING_ALLOWED=NO 2>&1
          fi

      - name: Create IPA
        run: |
          cd ios/App
          APP_NAME=$(ls build/App.xcarchive/Products/Applications/ | grep ".app$" | head -1)
          echo "Found app: $APP_NAME"
          mkdir -p build/Payload
          cp -r "build/App.xcarchive/Products/Applications/$APP_NAME" build/Payload/
          cd build
          zip -r App.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App
          path: ios/App/build/App.ipa
